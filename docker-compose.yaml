version: '3.8'
services:
  mssql_db:
    container_name: mssql_container
    image: mcr.microsoft.com/mssql/server:2022-CU16-ubuntu-22.04
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssqlsystem:/var/opt/mssql
      - ./config/mssql/entrypoint.sh:/usr/src/app/entrypoint.sh:ro
      - ./config/mssql/sql:/usr/src/app/docker-entrypoint-initdb.d:ro
    working_dir: /usr/src/app
    command: >
      sh -c "chmod +x ./entrypoint.sh &&
             ./entrypoint.sh & /opt/mssql/bin/sqlservr"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - env_net
    restart: unless-stopped

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    hostname: rabbitmq-node
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - env_net
    restart: unless-stopped

  owlpost_api:
    container_name: owlpost_api
    build:
      context: .
      dockerfile: OwlPost/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${CONNECTIONSTRINGS__DEFAULTCONNECTION}
    depends_on:
      mssql_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - env_net

networks:
  env_net:
    driver: bridge

volumes:
  rabbitmq_data:
  mssqlsystem:
